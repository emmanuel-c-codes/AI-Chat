<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Companion AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Custom styles for rendered Markdown inside chat bubbles */
        .prose pre { background: #1a1a1c; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; border: 1px solid #444746; }
        .prose code { font-family: monospace; color: #f472b6; background: #2c2d30; padding: 0.2rem 0.4rem; border-radius: 0.25rem; }
        .prose pre code { color: #e3e3e3; background: transparent; padding: 0; }
        .prose ul { list-style-type: disc; margin-left: 1.5rem; }
        .prose ol { list-style-type: decimal; margin-left: 1.5rem; }
        .prose p { margin-bottom: 0.5rem; }
    </style>
</head>
<body class="bg-[#131314] text-[#e3e3e3] font-sans h-screen flex overflow-hidden">

    <aside class="w-68 bg-[#1e1f20] h-full flex flex-col justify-between p-4 hidden md:flex transition-all duration-300">
        <div>
            <button id="clear-btn" class="w-full bg-[#1a1a1c] hover:bg-[#282a2c] text-sm font-medium py-3 px-4 rounded-full flex items-center gap-3 border border-[#444746] transition text-left mb-6 cursor-pointer">
                <i class="fa-solid fa-plus text-lg text-blue-400"></i>
                <span>New Chat</span>
            </button>

            <div class="space-y-1">
                <p class="text-xs font-semibold text-[#80868b] px-3 mb-2 uppercase tracking-wider">Recent</p>
                <div class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm bg-[#2c2d30] text-ellipsis overflow-hidden whitespace-nowrap">
                    <i class="fa-regular fa-message text-[#c4c7c5]"></i>
                    <span id="session-title">Active AI Session</span>
                </div>
            </div>
        </div>

        <div class="space-y-2 border-t border-[#444746] pt-4">
            <div class="flex items-center gap-3 px-3 py-2 text-xs text-[#80868b]">
                <i class="fa-solid fa-circle text-green-500 animate-pulse"></i>
                <span>Connected to Gemini Engine</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col justify-between h-full bg-[#131314] relative">
        
        <header class="p-4 flex items-center justify-between border-b border-[#282a2c]">
            <span class="text-lg font-semibold tracking-wide text-blue-400">My Companion AI</span>
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-purple-600 flex items-center justify-center font-bold text-xs text-white">AI</div>
            </div>
        </header>

        <section id="chat-feed" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 max-w-3xl w-full mx-auto">
            <div id="greeting" class="text-center my-24 space-y-3">
                <h1 class="text-4xl font-semibold bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">Hello, Developer</h1>
                <p class="text-[#c4c7c5] text-md">Your production-ready AI environment is active. Ask me anything.</p>
            </div>
        </section>

        <footer class="p-4 bg-[#131314]">
            <div class="max-w-3xl w-full mx-auto relative">
                <form id="chat-form" class="bg-[#1e1f20] rounded-3xl p-4 pr-12 flex items-center border border-transparent focus-within:border-[#444746] transition shadow-lg">
                    <input type="text" id="user-input" placeholder="Ask your AI companion..." autocomplete="off" class="w-full bg-transparent border-none outline-none text-[#e3e3e3] placeholder-[#80868b] text-base pr-4">
                    <button type="submit" class="absolute right-6 text-xl text-[#c4c7c5] hover:text-blue-400 transition cursor-pointer">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
                <p class="text-center text-xs text-[#80868b] mt-2">Powered by PHP and Gemini Framework architectures.</p>
            </div>
        </footer>
    </main>

    <script>
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const chatFeed = document.getElementById('chat-feed');
        const greeting = document.getElementById('greeting');
        const clearBtn = document.getElementById('clear-btn');

        // Dynamic JavaScript array holding full local conversation memory 
        let localChatHistory = [];

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageText = userInput.value.trim();
            if (!messageText) return;

            if (greeting) greeting.style.display = 'none';

            // 1. Render User Bubble
            appendMessage(messageText, 'user');
            userInput.value = '';

            // 2. Track message in historical payload state
            localChatHistory.push({
                "role": "user",
                "parts": [{"text": messageText}]
            });

            // 3. Show Loading Spinner
            const loadingId = appendMessage('Thinking...', 'loading');

            // 4. Send the entire conversation tree to our Vercel PHP function
            try {
                const response = await fetch('api/backend.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ history: localChatHistory })
                });
                
                if (!response.ok) {
                    throw new Error(`Server returned status code: ${response.status}`);
                }
                
                const data = await response.json();
                document.getElementById(loadingId).remove();
                
                // 5. Render Response
                appendMessage(data.reply, 'ai');

                // 6. Track model response in local sequence
                localChatHistory.push({
                    "role": "model",
                    "parts": [{"text": data.reply}]
                });

            } catch (error) {
                console.error("Tracking App Error Context:", error);
                if (document.getElementById(loadingId)) {
                    document.getElementById(loadingId).remove();
                }
                appendMessage("Failed to parse response from backend engine. Check developer tools console (F12) for status details.", 'ai');
            }
        });

        // Wiping local browser conversation state
        clearBtn.addEventListener('click', () => {
            localChatHistory = [];
            chatFeed.innerHTML = '';
            if (greeting) greeting.style.display = 'block';
        });

        function appendMessage(text, sender) {
            const msgId = 'msg-' + Date.now();
            const msgDiv = document.createElement('div');
            msgDiv.id = msgId;
            msgDiv.className = sender === 'user' ? 'flex justify-end' : 'flex justify-start';

            if (sender === 'user') {
                msgDiv.innerHTML = `<div class="bg-[#2c2d30] text-[#e3e3e3] rounded-2xl px-4 py-2.5 max-w-[85%] text-sm whitespace-pre-wrap">${text}</div>`;
            } else if (sender === 'loading') {
                msgDiv.innerHTML = `<div class="text-[#80868b] text-sm flex items-center gap-2"><i class="fa-solid fa-spinner animate-spin text-blue-400"></i> Thinking...</div>`;
            } else {
                const parsedHTML = marked.parse(text);
                msgDiv.innerHTML = `<div class="prose text-[#e3e3e3] rounded-2xl py-2 max-w-[95%] text-sm leading-relaxed">${parsedHTML}</div>`;
            }

            chatFeed.appendChild(msgDiv);
            chatFeed.scrollTop = chatFeed.scrollHeight;
            return msgId;
        }
    </script>
</body>
</html>
